<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Project Flow</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sf:#161b22;--sf2:#1c2128;
  --bd:#30363d;--dim:#21262d;
  --tx:#e6edf3;--mu:#8b949e;--su:#484f58;
  --green:#3fb950;--red:#f85149;
  --blue:#58a6ff;--blue2:#388bfd;--purple:#bc8cff;
  --hdr-bg:rgba(13,17,23,.96);--ruler-bg:rgba(13,17,23,.97);
  --overlay-bg:rgba(0,0,0,.72);--card-shadow:0 24px 80px rgba(0,0,0,.9);
  --grid-dot:#1c2230;--node-mix-a:#050b14;--node-mix-b:#020608;
  --danger-bg:#5c1a1a;--danger-tx:#f85149;--danger-bd:#7d2626;
  --theme-ring:rgba(88,166,255,.26);
}
body[data-theme="neumorphism"]{
  --bg:#e6ebf2;--sf:#edf2f7;--sf2:#dfe7f1;--bd:#c5d0de;--dim:#d3dce8;
  --tx:#2f3a4a;--mu:#617087;--su:#7b8798;--green:#0f9f8f;--red:#dc2626;
  --blue:#6366f1;--blue2:#6366f1;--purple:#8b5cf6;
  --hdr-bg:rgba(237,242,247,.92);--ruler-bg:rgba(237,242,247,.94);
  --overlay-bg:rgba(47,58,74,.32);--card-shadow:12px 12px 28px rgba(150,163,184,.45),-12px -12px 28px rgba(255,255,255,.86);
  --grid-dot:#c9d3df;--node-mix-a:#edf2f7;--node-mix-b:#dde6f1;
  --danger-bg:#fee2e2;--danger-tx:#b91c1c;--danger-bd:#fecaca;--theme-ring:rgba(99,102,241,.22);
}
body[data-theme="claymorphism"]{
  --bg:#f6f1fb;--sf:#fff9ff;--sf2:#efe5fb;--bd:#dfd2ec;--dim:#e9def5;
  --tx:#332f3a;--mu:#635f69;--su:#857c91;--green:#10b981;--red:#e11d48;
  --blue:#7c3aed;--blue2:#7c3aed;--purple:#db2777;
  --hdr-bg:rgba(255,249,255,.94);--ruler-bg:rgba(255,249,255,.95);
  --overlay-bg:rgba(51,47,58,.34);--card-shadow:0 22px 0 rgba(124,58,237,.10),0 26px 42px rgba(124,58,237,.15);
  --grid-dot:#ddd0eb;--node-mix-a:#fff9ff;--node-mix-b:#f1e7fb;
  --danger-bg:#ffe4e6;--danger-tx:#be123c;--danger-bd:#fecdd3;--theme-ring:rgba(124,58,237,.24);
}
body[data-theme="flat"]{
  --bg:#f8fafc;--sf:#ffffff;--sf2:#eef2ff;--bd:#cbd5e1;--dim:#e2e8f0;
  --tx:#111827;--mu:#475569;--su:#64748b;--green:#059669;--red:#dc2626;
  --blue:#2563eb;--blue2:#2563eb;--purple:#7c3aed;
  --hdr-bg:#ffffff;--ruler-bg:#ffffff;--overlay-bg:rgba(15,23,42,.32);
  --card-shadow:none;--grid-dot:#dbe3ef;--node-mix-a:#ffffff;--node-mix-b:#f1f5f9;
  --danger-bg:#fee2e2;--danger-tx:#b91c1c;--danger-bd:#fecaca;--theme-ring:rgba(37,99,235,.24);
}
body[data-theme="micro"]{
  --bg:#f3fbf8;--sf:#ffffff;--sf2:#e5f7ef;--bd:#bddfd2;--dim:#d7eee5;
  --tx:#12312a;--mu:#527167;--su:#789389;--green:#22c55e;--red:#dc2626;
  --blue:#0f766e;--blue2:#0f766e;--purple:#14b8a6;
  --hdr-bg:rgba(255,255,255,.94);--ruler-bg:rgba(255,255,255,.95);--overlay-bg:rgba(18,49,42,.34);
  --card-shadow:0 18px 42px rgba(15,118,110,.14);--grid-dot:#c9e8dd;--node-mix-a:#ffffff;--node-mix-b:#eaf8f2;
  --danger-bg:#fee2e2;--danger-tx:#b91c1c;--danger-bd:#fecaca;--theme-ring:rgba(15,118,110,.25);
}
body[data-theme="swiss"]{
  --bg:#f7f7f4;--sf:#ffffff;--sf2:#eeeeea;--bd:#111111;--dim:#d8d8d2;
  --tx:#050505;--mu:#52524f;--su:#74746f;--green:#166534;--red:#e11d48;
  --blue:#e11d48;--blue2:#e11d48;--purple:#111827;
  --hdr-bg:#ffffff;--ruler-bg:#ffffff;--overlay-bg:rgba(5,5,5,.34);
  --card-shadow:none;--grid-dot:#d3d3cc;--node-mix-a:#ffffff;--node-mix-b:#f0f0eb;
  --danger-bg:#ffe4e6;--danger-tx:#be123c;--danger-bd:#fda4af;--theme-ring:rgba(225,29,72,.23);
}
body[data-theme="spatial"]{
  --bg:#edf7ff;--sf:rgba(255,255,255,.72);--sf2:rgba(216,234,255,.78);--bd:rgba(90,126,170,.34);--dim:rgba(128,160,200,.28);
  --tx:#123047;--mu:#547089;--su:#7892aa;--green:#14b8a6;--red:#dc2626;
  --blue:#0ea5e9;--blue2:#0ea5e9;--purple:#6366f1;
  --hdr-bg:rgba(255,255,255,.62);--ruler-bg:rgba(255,255,255,.66);--overlay-bg:rgba(18,48,71,.30);
  --card-shadow:0 28px 70px rgba(31,80,128,.16);--grid-dot:#c9def1;--node-mix-a:rgba(255,255,255,.78);--node-mix-b:rgba(226,241,255,.78);
  --danger-bg:#fee2e2;--danger-tx:#b91c1c;--danger-bd:#fecaca;--theme-ring:rgba(14,165,233,.25);
}
body[data-theme="chaos"]{
  --bg:#fff9e8;--sf:#ffffff;--sf2:#e7ff59;--bd:#111111;--dim:#f2e7c4;
  --tx:#111111;--mu:#3c3c3c;--su:#595959;--green:#00a7ff;--red:#ff2d95;
  --blue:#ff2d95;--blue2:#ff2d95;--purple:#00a7ff;
  --hdr-bg:#fff9e8;--ruler-bg:#ffffff;--overlay-bg:rgba(17,17,17,.28);
  --card-shadow:8px 8px 0 #111111;--grid-dot:#f0dfab;--node-mix-a:#ffffff;--node-mix-b:#fff6d7;
  --danger-bg:#ffe4f1;--danger-tx:#be185d;--danger-bd:#111111;--theme-ring:rgba(255,45,149,.24);
}
body[data-theme="editorial"]{
  --bg:#f4f1ea;--sf:#fffdf8;--sf2:#ebe3d6;--bd:#1c1917;--dim:#ded6c8;
  --tx:#1c1917;--mu:#6b6259;--su:#8a8175;--green:#0f766e;--red:#b91c1c;
  --blue:#0f766e;--blue2:#0f766e;--purple:#854d0e;
  --hdr-bg:#fffdf8;--ruler-bg:#fffdf8;--overlay-bg:rgba(28,25,23,.34);
  --card-shadow:none;--grid-dot:#ddd4c5;--node-mix-a:#fffdf8;--node-mix-b:#eee5d8;
  --danger-bg:#fee2e2;--danger-tx:#991b1b;--danger-bd:#fecaca;--theme-ring:rgba(15,118,110,.24);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--tx);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-user-select:none;user-select:none}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--dim);
  background:var(--hdr-bg);backdrop-filter:blur(14px);z-index:400;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:9px}
.hdr-logo{font-size:15px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(125deg,#58a6ff 30%,#bc8cff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;gap:7px;align-items:center}
.pct{font-size:11px;color:var(--su);min-width:34px;text-align:right}
.btn{border:none;border-radius:7px;padding:5px 13px;font-size:12px;font-weight:500;
  cursor:pointer;transition:filter .12s,transform .08s}
.btn:active{transform:scale(.96)}
.btn:hover{filter:brightness(1.13)}
.btn:disabled{opacity:.38;cursor:not-allowed;filter:none;transform:none}
.btn-ghost{background:transparent;color:var(--mu);border:1px solid var(--bd)}
.btn-green{background:#238636;color:#fff;border:1px solid #2ea043}
.btn-active{background:var(--sf2)!important;color:var(--blue)!important;border-color:var(--blue2)!important}
.undo-btn{padding:5px 10px;font-size:13px}
.theme-wrap{position:relative}
.theme-btn{display:flex;align-items:center;gap:6px;min-width:82px;justify-content:center}
.theme-pop{
  position:absolute;right:0;top:calc(100% + 8px);z-index:1200;
  width:238px;background:var(--sf);border:1px solid var(--bd);
  border-radius:10px;padding:7px;box-shadow:var(--card-shadow);
  display:grid;gap:3px;animation:popIn .14s ease}
.theme-opt{
  width:100%;min-height:38px;border:1px solid transparent;background:transparent;
  color:var(--mu);border-radius:8px;padding:7px 9px;
  display:grid;grid-template-columns:18px 1fr auto;gap:8px;align-items:center;
  text-align:left;font-size:12px;cursor:pointer}
.theme-opt:hover{background:var(--sf2);color:var(--tx);filter:none;transform:none}
.theme-opt.sel{border-color:var(--blue2);background:color-mix(in srgb,var(--blue2) 12%,transparent);color:var(--tx)}
.theme-swatch{width:16px;height:16px;border-radius:50%;border:1px solid var(--bd);background:var(--swatch,#388bfd)}
.theme-check{font-size:11px;color:var(--green)}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sb{width:236px;background:var(--bg);border-right:1px solid var(--dim);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-head{padding:14px 10px 10px;border-bottom:1px solid var(--dim);flex-shrink:0}
.sb-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--su);padding:0 6px;margin-bottom:9px}
.pi{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 8px;
  border-radius:8px;cursor:pointer;
  transition:background .12s,border-left-color .2s,transform .15s,box-shadow .2s;
  user-select:none;margin-bottom:2px;border-left:3px solid transparent;position:relative}
.pi:hover{background:var(--sf);transform:translateX(2px)}
.pi.sel{background:var(--sf2);border-left-color:var(--pi-c,#388bfd);
  transform:translateX(4px);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.pi .pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:box-shadow .3s}
.pi.sel .pdot{box-shadow:0 0 8px var(--pi-c,#388bfd)}
.pname{font-size:12.5px;color:var(--mu);flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.pi.sel .pname{color:var(--tx)}
.pcnt{font-size:10px;color:var(--su);background:var(--dim);
  border-radius:10px;padding:1px 7px;transition:all .3s}
.pcnt.all-done{background:#052e16;color:var(--green)}
.pdone-label{font-size:9px;color:var(--green);border:1px solid #166534;
  border-radius:999px;padding:1px 6px;background:#052e16;white-space:nowrap}
.sb-add{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;
  cursor:pointer;background:none;border:none;color:var(--su);font-size:12px;
  width:100%;margin-top:5px;transition:color .1s,background .1s;text-align:left}
.sb-add:hover{color:var(--mu);background:var(--sf)}
.tl-wrap{flex:1;overflow-y:auto;padding:10px 10px 20px}
.tl-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--su);padding:6px 6px 10px}
.ti{display:flex;gap:9px;margin-bottom:13px;position:relative;animation:tiFade .35s ease}
@keyframes tiFade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ti:not(:last-child)::before{content:'';position:absolute;left:3px;top:12px;
  width:1px;bottom:-13px;background:var(--dim)}
.tidot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;
  position:relative;z-index:1;transition:box-shadow .3s}
.tic{flex:1;min-width:0}
.tit{font-size:11.5px;color:var(--mu);font-weight:500;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.tim{font-size:10px;color:var(--su);margin-top:2px}

/* ── Time ruler ── */
.time-ruler{
  height:68px;flex-shrink:0;position:relative;
  background:var(--ruler-bg);border-bottom:1px solid var(--dim);
  overflow:hidden;backdrop-filter:blur(12px);}
.tr-col{
  position:absolute;top:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;
  padding-top:26px;
  border-right:1px solid rgba(255,255,255,.04);
  transition:background .2s;}
.tr-col.past{opacity:.5}
.tr-col.today{background:rgba(56,139,253,.1);border-right:1px solid rgba(56,139,253,.18)}
.tr-today-badge{
  position:absolute;top:6px;
  background:var(--blue2);color:#fff;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;letter-spacing:.04em;line-height:13px}
.tr-date{font-size:13.5px;font-weight:700;color:var(--tx);line-height:16px}
.tr-col.today .tr-date{color:var(--blue)}
.tr-col.past .tr-date{color:var(--mu)}
.tr-week{font-size:10px;color:var(--su);line-height:12px}
.tr-col.today .tr-week{color:color-mix(in srgb,var(--blue2) 50%,transparent)}

/* ── Today column in canvas ── */
.today-col-bg{
  position:absolute;
  background:rgba(56,139,253,.03);
  border-left:1px solid rgba(56,139,253,.1);
  border-right:1px solid rgba(56,139,253,.1);
  pointer-events:none;z-index:0;}

/* ── Canvas ── */
.cv-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.cv-wrap{flex:1;position:relative;overflow:hidden;
  background-color:var(--bg);
  background-image:radial-gradient(circle,var(--grid-dot) 1px,transparent 1px);
  background-size:28px 28px}
.cv-wrap.pan-mode{cursor:grabbing!important}
.cv-wrap.drag-node{cursor:grabbing!important}
.cv{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ── Node card ── */
.nc{
  position:absolute;width:232px;
  background:linear-gradient(145deg,
  color-mix(in srgb,var(--nc-dot,#60a5fa) 22%,var(--node-mix-a)),
  color-mix(in srgb,var(--nc-dot,#60a5fa) 10%,var(--node-mix-b)));
  border:1.5px solid var(--nc-bd,#30363d);
  border-radius:14px;padding:14px 14px 11px;
  cursor:grab;overflow:visible;
  animation:ncSpring .34s cubic-bezier(.22,.68,0,1.28);
  transition:border-color .35s,background .35s,box-shadow .35s,transform .18s,opacity .3s;
  will-change:transform;}
@keyframes ncSpring{
  0%  {opacity:0;transform:scale(.72) translateY(10px)}
  60% {opacity:1;transform:scale(1.04) translateY(-3px)}
  80% {transform:scale(.98) translateY(1px)}
  100%{opacity:1;transform:scale(1) translateY(0)}}
.nc:hover:not(.is-drag){
  box-shadow:0 6px 28px rgba(0,0,0,.55),0 0 0 1px color-mix(in srgb,var(--nc-bd,#30363d) 80%,transparent);
  transform:translateY(-2px)}
.nc.is-drag{
  transform:scale(1.07)!important;
  box-shadow:0 28px 70px rgba(0,0,0,.75),0 0 0 3px var(--nc-bd,#30363d)!important;
  cursor:grabbing!important;z-index:999;opacity:.93}
.nc.is-sel{
  box-shadow:0 0 0 2px var(--blue),0 0 18px var(--theme-ring)!important;
  z-index:100}
.nc.s-done{
  --nc-bd:#2ea043!important;--nc-dot:#4ade80!important;
  box-shadow:0 0 0 3px rgba(46,160,67,.18);
  background:linear-gradient(145deg,#123d27,#0b2f1d)!important;}
.nc:has(.cp-panel),.nc:has(.dd){z-index:200!important}
.cv-wrap.arranging .nc{transition:left .48s cubic-bezier(.22,.68,0,1.2),top .48s cubic-bezier(.22,.68,0,1.2),border-color .35s,background .35s,box-shadow .35s,transform .18s,opacity .3s}
.nc:not(.s-done){box-shadow:0 0 0 3px var(--nc-glow,transparent)}
.nc-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-right:18px}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--nc-dot,#60a5fa);transition:background .35s,box-shadow .35s}
.nc:not(.s-done) .ndot{animation:ndPulse 2.8s ease-in-out infinite}
.nc.s-done .ndot{animation:none;box-shadow:0 0 10px var(--nc-dot,#4ade80)}
@keyframes ndPulse{
  0%,100%{box-shadow:0 0 0 0 transparent}
  50%{box-shadow:0 0 0 5px var(--nc-glow,rgba(96,165,250,.2))}}
.ntitle{flex:1;font-size:13px;font-weight:500;color:var(--tx);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  -webkit-user-select:none;user-select:none;cursor:text;transition:color .35s}
.nc.s-done .ntitle{color:var(--nc-dot,#4ade80)}
.nti{flex:1;background:none;border:none;border-bottom:1.5px solid var(--nc-dot,#388bfd);
  color:var(--tx);font-size:13px;font-weight:500;outline:none;padding-bottom:1px;
  min-width:0;-webkit-user-select:text;user-select:text}
.nc-bot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ndate{font-size:10px;color:var(--su);flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.ndeadline{
  font-size:9.5px;display:inline-flex;align-items:center;gap:3px;
  padding:1px 6px;border-radius:10px;cursor:pointer;
  transition:filter .12s;}
.ndeadline:hover{filter:brightness(1.2)}
.ndeadline.ok{background:#0a2318;color:#4ade80}
.ndeadline.today-dl{background:#0e2456;color:#60a5fa}
.ndeadline.overdue{background:#2d0f0f;color:#f85149}
.ndeadline.soon{background:#2e1c04;color:#fbbf24}
.ndeadline.neutral{background:var(--dim);color:var(--su)}
.ndeadline-input{
  font-size:10px;background:var(--bg);border:1px solid var(--blue2);
  border-radius:5px;color:var(--tx);outline:none;padding:1px 4px;
  -webkit-user-select:text;user-select:text;cursor:text;width:108px}
.nac{display:flex;gap:3px;align-items:center;flex-shrink:0}
.ib{width:22px;height:22px;border-radius:5px;border:none;background:none;
  color:var(--su);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,color .1s}
.ib:hover{background:var(--bd);color:var(--mu)}
.ib.del:hover{color:var(--red)}
.arb{display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:6px;border:1px solid var(--bd);
  background:var(--bg);color:var(--su);font-size:10px;cursor:pointer;
  position:relative;transition:border-color .12s,color .12s,background .12s}
.arb:hover,.arb.open{border-color:var(--nc-dot,#388bfd);color:var(--nc-dot,#388bfd)}

/* Color picker */
.cp-wrap{position:absolute;top:9px;right:9px;z-index:20}
.cp-ring{width:13px;height:13px;border-radius:50%;
  background:var(--nc-dot,#60a5fa);cursor:pointer;
  border:2px solid color-mix(in srgb,var(--tx) 18%,transparent);
  transition:transform .15s,box-shadow .15s}
.cp-ring:hover{transform:scale(1.3);box-shadow:0 0 10px var(--nc-dot,#388bfd)}
.cp-panel{
  position:absolute;right:-3px;top:20px;
  background:var(--sf2);border:1px solid var(--bd);
  border-radius:11px;padding:9px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  z-index:3000;box-shadow:var(--card-shadow);
  animation:popIn .14s ease}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(-4px)}to{opacity:1;transform:none}}
.cp-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .12s,border-color .12s}
.cp-opt:hover{transform:scale(1.22)}
.cp-opt.sel{border-color:rgba(255,255,255,.75);transform:scale(1.18)}

/* Dropdown */
.dd{position:absolute;right:0;top:calc(100% + 7px);
  background:var(--sf2);border:1px solid var(--bd);border-radius:10px;
  overflow:hidden;min-width:154px;z-index:3000;
  box-shadow:var(--card-shadow);animation:popIn .14s ease}
.ddi{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;
  background:none;border:none;color:var(--mu);font-size:12.5px;
  cursor:pointer;text-align:left;transition:background .07s,color .07s}
.ddi:hover{background:var(--bd)}
.ddi.c:hover{color:#60a5fa}.ddi.b:hover{color:#c084fc}.ddi.d:hover{color:var(--green)}
.ddsep{height:1px;background:var(--dim)}

/* New card */
.newc{position:absolute;width:232px;background:color-mix(in srgb,var(--blue2) 14%,var(--sf));
  border:1.5px dashed var(--blue2);border-radius:14px;padding:12px 14px;
  animation:ncSpring .2s ease;z-index:10;cursor:default}
.newlbl{font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.09em;color:#60a5fa;margin-bottom:8px}
.newrow{display:flex;gap:5px;align-items:center}
.newinp{flex:1;background:none;border:none;border-bottom:1.5px solid color-mix(in srgb,var(--blue2) 50%,transparent);
  color:var(--tx);font-size:13px;outline:none;padding-bottom:2px;
  -webkit-user-select:text;user-select:text}
.newinp::placeholder{color:var(--su)}
.bstart{background:#238636;color:#fff;border:none;border-radius:5px;
  padding:3px 10px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.bstart:hover{background:#2ea043}
.bx{background:none;border:none;color:var(--su);cursor:pointer;font-size:14px;padding:2px 4px}
.bx:hover{color:var(--mu)}

/* SVG connections */
.conn{fill:none;stroke-linecap:round}

/* Hint bar */
.hint{position:absolute;bottom:14px;right:130px;background:var(--sf2);
  border:1px solid var(--bd);border-radius:8px;padding:5px 12px;
  font-size:10.5px;color:var(--su);pointer-events:none;opacity:.55;
  -webkit-user-select:none;user-select:none}

/* Save flash */
.sv{font-size:11px;color:#3fb950;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.sv.show{opacity:1}

/* Gist button */
.btn-gist{background:var(--dim);color:var(--mu);border:1px solid var(--bd);gap:5px;display:flex;align-items:center}
.btn-gist.connected{color:var(--blue);border-color:color-mix(in srgb,var(--blue2) 35%,transparent)}
.btn-gist.syncing{color:#d29922}
.btn-gist.err{color:#f85149;border-color:#f8514940}

/* Modal */
.mo{position:fixed;inset:0;background:var(--overlay-bg);z-index:9000;
  display:flex;align-items:center;justify-content:center;animation:moIn .18s ease}
@keyframes moIn{from{opacity:0}to{opacity:1}}
.mp{background:var(--sf);border:1px solid var(--bd);border-radius:16px;
  padding:28px 28px 24px;width:440px;max-width:92vw;
  box-shadow:var(--card-shadow);animation:popIn .18s ease}
.mp h2{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--tx)}
.mp p{font-size:12px;color:var(--mu);line-height:1.65;margin-bottom:16px}
.mp a{color:var(--blue);text-decoration:none}
.mp a:hover{text-decoration:underline}
.mp-row{display:flex;gap:8px;margin-bottom:10px}
.mp-inp{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;
  padding:8px 12px;color:var(--tx);font-size:13px;font-family:monospace;outline:none}
.mp-inp:focus{border-color:var(--blue2)}
.mp-inp::placeholder{color:var(--su)}
.mp-note{font-size:11px;color:var(--su);margin-top:4px}
.mp-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.mp-sep{height:1px;background:var(--dim);margin:16px 0}
.mp-status{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:12px}
.mp-status.ok{background:#0a3620;color:#3fb950;border:1px solid #166534}
.mp-status.err{background:#2d0f0f;color:#f85149;border:1px solid #5c1a1a}

/* ── Stats panel ── */
.stats-panel{
  position:absolute;right:16px;top:50%;
  transform:translateY(-50%);
  background:color-mix(in srgb,var(--sf) 92%,transparent);
  border:1px solid var(--bd);
  border-radius:14px;padding:16px 14px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  z-index:300;backdrop-filter:blur(12px);
  pointer-events:auto;min-width:88px;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.stat-sep{width:100%;height:1px;background:var(--dim)}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--su)}
.stat-value{font-size:28px;font-weight:800;line-height:1;
  font-variant-numeric:tabular-nums}
.stat-item.ongoing .stat-value{color:#60a5fa}
.stat-item.donestat .stat-value{color:#4ade80}
.stat-tag{font-size:8.5px;color:var(--su);text-align:center}

.next-job-mini{
  margin-top:7px;border:1px solid rgba(46,160,67,.7);
  background:#238636;color:#fff;border-radius:7px;
  padding:4px 8px;font-size:10px;font-weight:700;
  cursor:pointer;line-height:1.2;white-space:nowrap;pointer-events:auto}
.next-job-mini:hover{filter:brightness(1.12)}
.next-job-mini:disabled{opacity:.42;cursor:not-allowed;filter:none}
.sync-retry{padding:5px 9px}
.toast{
  position:fixed;left:50%;bottom:78px;transform:translateX(-50%);
  z-index:9200;background:var(--sf);border:1px solid var(--bd);color:var(--tx);
  border-radius:999px;padding:8px 14px;font-size:12px;
  box-shadow:0 14px 44px rgba(0,0,0,.45)}
.done-summary-chip,.project-done-badge{
  display:inline-flex;align-items:center;gap:4px;border:1px solid #166534;
  background:#052e16;color:#4ade80;border-radius:999px;font-size:10px;
  padding:2px 7px;line-height:1.35}
.done-summary-chip{cursor:pointer;margin-top:4px;width:max-content}
.done-summary-chip:hover{filter:brightness(1.15)}
.ddi:disabled{opacity:.42;cursor:not-allowed}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.summary-item{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:10px}
.summary-k{font-size:10px;color:var(--mu);margin-bottom:4px}
.summary-v{font-size:17px;font-weight:800;color:var(--tx)}
.conflict-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.conflict-note{font-size:11px;color:var(--mu);line-height:1.6;margin-top:8px}

/* ── AI bar ── */
.ai-bar{
  flex-shrink:0;
  background:var(--ruler-bg);
  border-top:1px solid var(--dim);
  z-index:350;
  transition:all .22s cubic-bezier(.22,.68,0,1);}
.ai-toggle{
  display:flex;align-items:center;gap:9px;
  padding:9px 20px;cursor:pointer;
  font-size:12.5px;color:var(--mu);
  transition:color .12s;user-select:none;}
.ai-toggle:hover{color:var(--tx)}
.ai-glow{color:#bc8cff;font-size:15px;filter:drop-shadow(0 0 6px #bc8cff80)}
.ai-chevron{margin-left:auto;font-size:10px;color:var(--su);
  transition:transform .2s}
.ai-chevron.up{transform:rotate(180deg)}
.ai-body{padding:0 20px 14px;display:flex;flex-direction:column;gap:8px}
.ai-textarea{
  width:100%;min-height:86px;max-height:200px;
  background:var(--sf);border:1px solid var(--bd);
  border-radius:10px;color:var(--tx);font-size:12.5px;
  font-family:inherit;padding:10px 13px;
  outline:none;resize:vertical;
  transition:border-color .15s;line-height:1.55;}
.ai-textarea:focus{border-color:color-mix(in srgb,var(--blue2) 50%,transparent)}
.ai-textarea::placeholder{color:var(--su)}
.ai-actions{display:flex;justify-content:space-between;align-items:center}
.ai-hint{font-size:10.5px;color:var(--su)}
.ai-generating{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#bc8cff}
@keyframes aiSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ai-spin{display:inline-block;animation:aiSpin .8s linear infinite}

/* ── Done animation ── */
@keyframes doneFloat{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(0.2)}
  20% {opacity:1;transform:translate(-50%,-60%) scale(1.45)}
  55% {opacity:1;transform:translate(-50%,-130%) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-220%) scale(0.85)}}
@keyframes checkBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  30%{transform:scale(1.35) rotate(-8deg)}
  60%{transform:scale(0.95) rotate(4deg)}}
@keyframes particleRing{
  0%{opacity:1;transform:scale(0)}
  60%{opacity:.7;transform:scale(1.6)}
  100%{opacity:0;transform:scale(2.2)}}
.done-particle{
  position:fixed;pointer-events:none;z-index:9999;
  animation:doneFloat 1.6s cubic-bezier(.22,.68,0,1) forwards;
  display:flex;flex-direction:column;align-items:center;gap:5px;}
.done-particle-ring{
  position:absolute;width:60px;height:60px;border-radius:50%;
  border:2px solid currentColor;
  animation:particleRing 1s .1s ease-out forwards;opacity:0;}
.done-particle-icon{
  font-size:44px;line-height:1;
  filter:drop-shadow(0 0 12px currentColor);
  animation:checkBounce .5s .1s cubic-bezier(.22,.68,0,1.4) both;}
.done-particle-label{
  font-size:11px;font-weight:700;color:#fff;
  text-shadow:0 0 12px currentColor;white-space:nowrap;opacity:.9;
  background:rgba(0,0,0,.4);padding:2px 8px;border-radius:10px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}

/* ── Delete confirmation dialog ── */
.del-confirm-overlay{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:center;justify-content:center;
  background:var(--overlay-bg);backdrop-filter:blur(4px);
}
.del-confirm-box{
  background:var(--sf);border:1px solid var(--bd);border-radius:12px;
  padding:28px 32px;min-width:260px;text-align:center;
  box-shadow:var(--card-shadow);
  animation:delBoxIn .15s ease;
}
@keyframes delBoxIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.del-confirm-box h3{margin:0 0 6px;color:var(--tx);font-size:15px;font-weight:600;}
.del-confirm-box p{margin:0 0 22px;color:var(--mu);font-size:13px;line-height:1.5;}
.del-confirm-btns{display:flex;gap:10px;justify-content:center;}
.del-confirm-btns button{
  padding:7px 30px;border-radius:7px;font-size:13px;
  cursor:pointer;font-weight:600;transition:opacity .15s;border:none;
}
.del-confirm-btns button:hover{opacity:.82;}
.del-btn-yes{background:#da3633;color:#fff;}
.del-btn-no{background:var(--dim);color:var(--tx);border:1px solid var(--bd)!important;}

/* ── Account and guide ── */
.auth-gate{position:fixed;inset:0;z-index:9500;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 10%,var(--theme-ring),transparent 34%),var(--bg)}
.auth-card{width:420px;max-width:92vw;background:var(--sf);border:1px solid var(--bd);border-radius:16px;
  padding:28px;box-shadow:var(--card-shadow)}
.auth-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.auth-top .auth-logo{margin-bottom:0}
.auth-top .theme-btn{min-width:74px;padding:5px 10px}
.auth-top .theme-pop{right:0;top:calc(100% + 7px)}
.auth-logo{font-size:20px;font-weight:800;margin-bottom:8px;
  background:linear-gradient(125deg,#58a6ff 20%,#bc8cff 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-sub{font-size:13px;line-height:1.6;color:var(--mu);margin-bottom:20px}
.auth-tabs{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:3px;margin-bottom:16px}
.auth-tabs button{flex:1;border:0;border-radius:7px;background:transparent;color:var(--mu);padding:8px 10px;cursor:pointer}
.auth-tabs button.active{background:var(--sf2);color:var(--tx)}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.auth-field label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.auth-field input{height:40px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);
  padding:0 12px;font-size:13px;outline:none}
.auth-field input:focus{border-color:var(--blue2)}
.auth-consent{display:flex;align-items:flex-start;gap:9px;margin:2px 0 14px;font-size:12px;color:var(--mu);line-height:1.55}
.auth-consent input{width:16px;height:16px;margin-top:2px;accent-color:var(--blue2);flex-shrink:0}
.auth-consent button{border:0;background:transparent;color:var(--blue);font:inherit;padding:0;cursor:pointer}
.auth-consent button:hover{text-decoration:underline}
.auth-error{background:#2d0f0f;border:1px solid #5c1a1a;color:#f87171;border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:10px}
.auth-note{font-size:11px;color:var(--su);line-height:1.55;margin-top:12px}
.legal-modal{width:760px;max-width:94vw;max-height:86vh;background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:12px;padding:0;overflow:hidden}
.legal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 26px;border-bottom:1px solid var(--dim)}
.legal-head h2{font-size:20px;color:var(--tx);margin:0 0 5px}
.legal-head p{font-size:12px;color:var(--mu);margin:0;line-height:1.5}
.legal-close{border:1px solid var(--bd);background:var(--sf);color:var(--tx);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.legal-close:hover{background:var(--sf2)}
.legal-body{padding:24px 30px;overflow:auto;max-height:calc(86vh - 92px)}
.legal-body h3{font-size:15px;color:var(--tx);margin:24px 0 8px}
.legal-body h3:first-child{margin-top:0}
.legal-body p,.legal-body li{font-size:13px;color:var(--tx);line-height:1.75}
.legal-body p{margin:0 0 12px}
.legal-body ul{margin:0 0 14px 18px;padding:0}
.legal-body strong{color:var(--tx)}
.acct-btn{display:flex;align-items:center;gap:6px}
.ent-pill{font-size:11px;color:var(--mu);background:var(--dim);border:1px solid var(--bd);border-radius:999px;padding:5px 10px;white-space:nowrap}
.ent-pill.ok{color:#3fb950;border-color:#23863680;background:#0a2318}
.ent-pill.warn{color:#fbbf24;border-color:#b4530980;background:#2e1c04}
.ent-pill.bad{color:#f87171;border-color:#7f1d1d;background:#2d0f0f}
.account-panel{width:480px}
.account-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--dim)}
.account-row:last-child{border-bottom:0}
.account-k{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.account-v{font-size:13px;color:var(--tx);text-align:right}
.license-row{display:flex;gap:8px;margin-top:12px}
.license-row input{flex:1;height:38px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);
  padding:0 12px;font-size:13px;outline:none;font-family:monospace}
.desktop-panel{width:560px}
.desktop-panel h3{font-size:13px;color:var(--tx);margin:16px 0 8px}
.desktop-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.desktop-row{display:flex;justify-content:space-between;gap:12px;background:var(--bg);border:1px solid var(--dim);border-radius:8px;padding:9px 10px;font-size:12px;color:var(--tx)}
.desktop-row span:last-child{color:var(--mu);text-align:right}
.desktop-textarea{width:100%;min-height:96px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 12px;font-size:13px;outline:none;resize:vertical}
.desktop-empty{font-size:12px;color:var(--mu);background:var(--bg);border:1px dashed var(--bd);border-radius:8px;padding:12px;margin-top:10px}
.guide-modal{width:860px;max-width:94vw;padding:0;overflow:hidden}
.guide-head{display:flex;justify-content:space-between;gap:12px;padding:20px 22px;border-bottom:1px solid var(--dim)}
.guide-title{font-size:17px;font-weight:800;color:var(--tx)}
.guide-sub{font-size:12px;color:var(--mu);margin-top:4px}
.guide-body{display:grid;grid-template-columns:1.08fr .92fr;gap:0;min-height:420px}
.guide-visual{background:var(--bg);border-right:1px solid var(--dim);padding:22px;display:flex;align-items:center;justify-content:center}
.guide-shot{width:100%;max-width:430px;aspect-ratio:4/3;border:1px solid var(--bd);border-radius:12px;background:var(--bg);position:relative;overflow:hidden;
  box-shadow:var(--card-shadow)}
.guide-shot .mini-top{height:34px;border-bottom:1px solid var(--dim);display:flex;align-items:center;gap:6px;padding:0 12px;color:var(--mu);font-size:10px}
.guide-shot .mini-side{position:absolute;left:0;top:34px;bottom:0;width:92px;background:var(--sf);border-right:1px solid var(--dim);padding:12px 8px}
.guide-shot .mini-pill{height:18px;border-radius:6px;background:var(--sf2);margin-bottom:8px}
.guide-shot .mini-canvas{position:absolute;left:92px;right:0;top:34px;bottom:0;background-image:radial-gradient(circle,var(--grid-dot) 1px,transparent 1px);background-size:18px 18px}
.guide-mini-node{position:absolute;width:112px;height:42px;border-radius:10px;background:#0e2456;border:1px solid #1d4ed8;box-shadow:0 0 0 3px rgba(96,165,250,.16)}
.guide-mini-node.done{background:#0a2318;border-color:#166534;box-shadow:0 0 0 3px rgba(74,222,128,.16)}
.guide-mini-line{position:absolute;height:2px;background:#388bfd;transform-origin:left center}
.guide-content{padding:22px;display:flex;flex-direction:column}
.guide-step-label{font-size:11px;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.guide-content h3{font-size:21px;color:var(--tx);margin:0 0 10px}
.guide-content p{font-size:13px;line-height:1.7;color:var(--mu);margin:0 0 14px}
.guide-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.guide-list div{font-size:12.5px;color:var(--tx);background:var(--bg);border:1px solid var(--dim);border-radius:8px;padding:9px 10px}
.guide-progress{display:flex;gap:6px;margin-top:auto;padding-top:20px}
.guide-dot{height:6px;flex:1;border-radius:999px;background:var(--bd)}
.guide-dot.active{background:var(--blue2)}
.guide-actions{display:flex;justify-content:space-between;gap:10px;padding:16px 22px;border-top:1px solid var(--dim)}
body:not([data-theme="dark"]) .hdr-logo,
body:not([data-theme="dark"]) .auth-logo{
  background:linear-gradient(125deg,var(--blue) 20%,var(--purple) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
body:not([data-theme="dark"]) .btn-active{color:var(--blue)!important;border-color:var(--blue2)!important;background:var(--sf2)!important}
body:not([data-theme="dark"]) .tr-today-badge{background:var(--blue2)}
body:not([data-theme="dark"]) .tr-col.today{background:color-mix(in srgb,var(--blue2) 12%,transparent);border-right-color:color-mix(in srgb,var(--blue2) 22%,transparent)}
body:not([data-theme="dark"]) .tr-col.today .tr-date{color:var(--blue)}
body:not([data-theme="dark"]) .today-col-bg{background:color-mix(in srgb,var(--blue2) 5%,transparent);border-color:color-mix(in srgb,var(--blue2) 14%,transparent)}

}
body:not([data-theme="dark"]) .nc.s-done .ntitle,
body:not([data-theme="dark"]) .nc.s-done .ndate,
body:not([data-theme="dark"]) .nc.s-done .ib,
body:not([data-theme="dark"]) .nc.s-done .arb{color:#166534}

}

body:not([data-theme="dark"]) .pcnt.all-done,
body:not([data-theme="dark"]) .pdone-label,
body:not([data-theme="dark"]) .done-summary-chip,

body:not([data-theme="dark"]) .ndeadline.today-dl{background:color-mix(in srgb,var(--blue2) 12%,var(--sf));color:var(--blue)}

body:not([data-theme="dark"]) .ndeadline.neutral{background:var(--sf2);color:var(--su)}
body:not([data-theme="dark"]) .arb{background:var(--sf);color:var(--su)}
body:not([data-theme="dark"]) .guide-mini-line{background:var(--blue2)}
body:not([data-theme="dark"]) .guide-mini-node{background:color-mix(in srgb,var(--blue2) 16%,var(--sf));border-color:var(--blue2)}

function todayMidnight(){const d=new Date();d.setHours(0,0,0,0);return d;}

function dateToOffset(iso){
  const today=todayMidnight();
  const d=new Date(iso);d.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}
function offsetToDate(off){
  const d=todayMidnight();
  d.setDate(d.getDate()+off);return d;
}
function fmtRulerDate(d){
  const m=d.getMonth()+1,day=d.getDate();
  const wds=['日','一','二','三','四','五','六'];
  return{date:`${m}月${day}日`,week:`周${wds[d.getDay()]}`};
}
function fmtDeadline(iso,isDone){
  const off=dateToOffset(iso);
  if(isDone)return{label:`✓ ${iso}`,cls:'ok'};
  if(off<0)return{label:`过期${Math.abs(off)}天`,cls:'overdue'};

  if(off<=3)return{label:`还剩${off}天`,cls:'soon'};

async function getSessionToken(){
  if(!supabaseClient)return null;
  const {data}=await supabaseClient.auth.getSession();
  return data.session?.access_token||null;
}

async function apiCall(path,{method='GET',body}={}){
  if(!supabaseClient)throw new Error('后端尚未配置 Supabase');
  const token=await getSessionToken();
  const r=await fetch(`${PF_CONFIG.supabaseUrl}/functions/v1/${path}`,{
    method,
    headers:{
      'Content-Type':'application/json',
      'apikey':PF_CONFIG.supabaseAnonKey,
      ...(token?{Authorization:`Bearer ${token}`}:{})
    },
    ...(body!==undefined?{body:JSON.stringify(body)}:{})
  });
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||data.message||'请求失败');
  return data;
}

async function gistSave(token,gistId,data){
  const body={description:'Project Flow 工作流数据',public:false,
    files:{[GIST_FILE]:{content:JSON.stringify(data)}}};
  const url=gistId?`https://api.github.com/gists/${gistId}`:'https://api.github.com/gists';
  const r=await fetch(url,{method:gistId?'PATCH':'POST',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText);}
  return r.json();
}
async function gistLoad(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,
    {headers:{Authorization:`token ${token}`}});
  if(!r.ok)throw new Error(r.statusText);
  const d=await r.json();
  const raw=d.files?.[GIST_FILE]?.content;
  return raw?JSON.parse(raw):null;
}
async function findProjectFlowGist(token){
  for(let page=1;page<=3;page++){
    const r=await fetch(`https://api.github.com/gists?per_page=100&page=${page}`,
      {headers:{Authorization:`token ${token}`}});
    if(!r.ok)throw new Error(r.statusText);
    const items=await r.json();
    const found=items.find(g=>g.files?.[GIST_FILE]);
    if(found)return found;
    if(!Array.isArray(items)||items.length<100)break;
  }
  return null;
}
async function verifyToken(token){
  const r=await fetch('https://api.github.com/user',{headers:{Authorization:`token ${token}`}});
  if(!r.ok)throw new Error('Token 无效');return r.json();
}

function stableValue(v){
  if(Array.isArray(v))return v.map(stableValue);
  if(v&&typeof v==='object'){
    return Object.keys(v).sort().reduce((acc,k)=>{
      if(k==='lastCloudSavedAt'||k==='clientUpdatedAt'||k==='workspaceHash')return acc;
      acc[k]=stableValue(v[k]);return acc;
    },{});
  }
  return v;
}
function hashString(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);
  }
  return (h>>>0).toString(16);
}
function workspaceHash(data){
  return hashString(JSON.stringify(stableValue({
    nodes:data?.nodes||{},
    manPos:data?.manPos||{},
    laneOffsets:data?.laneOffsets||{},
    selRoot:data?.selRoot||'',
    pan:data?.pan||{},
    scale:data?.scale||1,
    hideDone:!!data?.hideDone
  })));
}
function hasWorkspaceData(data){
  return !!data?.nodes&&Object.keys(data.nodes).length>0;
}
function fmtClock(ts){
  if(!ts)return '';
  const d=new Date(ts);
  if(Number.isNaN(d.getTime()))return '';
  return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});
}
function cloudErrorLabel(err){
  const msg=(err?.message||String(err||'')).toLowerCase();
  if(typeof navigator!=='undefined'&&!navigator.onLine)return '网络';
  if(msg.includes('jwt')||msg.includes('401')||msg.includes('unauthorized')||msg.includes('未登录'))return '未登录';
  if(msg.includes('network')||msg.includes('fetch'))return '网络';
  return '服务错误';
}
function cloudStatusText(status,lastSavedAt,errorLabel){
  if(status==='syncing')return '同步中';
  if(status==='ok')return `已保存 ${fmtClock(lastSavedAt)||''}`.trim();
  if(status==='error')return `同步失败：${errorLabel||'服务错误'}`;
  if(status==='pending')return '本地有变更，等待同步';
  return '本地保存';
}

/* ── Tree layout ── */
function calcLayout(ns){
  const kids=pid=>Object.values(ns).filter(n=>n.parentId===pid);
  const roots=Object.values(ns).filter(n=>!n.parentId);
  const pos={};let sy=52;
  function place(id,d){
    const ch=kids(id);
    if(!ch.length){pos[id]={x:52+d*(NW+HG),y:sy};sy+=SL;return;}
    ch.forEach(c=>place(c.id,d+1));
    const fy=pos[ch[0].id].y+NH/2,ly=pos[ch[ch.length-1].id].y+NH/2;
    pos[id]={x:52+d*(NW+HG),y:(fy+ly)/2-NH/2};
  }
  roots.forEach(r=>{place(r.id,0);sy+=SL*.65;});
  return pos;
}

/* ── Time-based layout ── */
// Returns { pos, offsets, groupBounds, rootOf, laneBounds }
// X is controlled by date columns. Y is controlled by project lanes.
// A dragged project lane stores only a Y offset, so dates stay aligned.
function calcTimeLayout(allNs, realNodes, laneOffsets={}){
  const today=todayMidnight();
  const nodeList=Object.values(allNs);
  const byId=allNs;
  const children={};
  nodeList.forEach(n=>{
    if(!children[n.parentId||'__root__'])children[n.parentId||'__root__']=[];
    children[n.parentId||'__root__'].push(n);
  });
  Object.values(children).forEach(list=>list.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)||String(a.id).localeCompare(String(b.id))));

  const offsets={};
  function getOff(id,stack=[]){
    if(offsets[id]!==undefined)return offsets[id];
    if(stack.includes(id)){offsets[id]=0;return 0;}
    const n=realNodes[id]||allNs[id];
    if(!n){offsets[id]=0;return 0;}
    let off;
    if(n.deadline){
      const d=new Date(n.deadline);d.setHours(0,0,0,0);
      off=Math.round((d-today)/86400000);
    }else if(n.parentId&&allNs[n.parentId]){
      off=getOff(n.parentId,[...stack,id]);
    }else if(n.createdAt){
      const d=new Date(n.createdAt);d.setHours(0,0,0,0);
      off=Math.round((d-today)/86400000);
    }else{
      off=0;
    }
    offsets[id]=off;
    return off;
  }
  Object.keys(allNs).forEach(id=>getOff(id));

  const rootOf={};
  function getRoot(id,stack=[]){
    if(rootOf[id])return rootOf[id];
    const n=byId[id];
    if(!n||!n.parentId||!byId[n.parentId]||stack.includes(id)){
      rootOf[id]=id;
      return id;
    }
    const root=getRoot(n.parentId,[...stack,id]);
    rootOf[id]=root;
    return root;
  }
  Object.keys(allNs).forEach(id=>getRoot(id));

  const roots=Object.values(allNs)
    .filter(n=>rootOf[n.id]===n.id)
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)||String(a.id).localeCompare(String(b.id)));

  const rowOf={};
  const rowMaxByRoot={};
  function assignRows(id,row,stack=[]){
    if(stack.includes(id)){rowOf[id]=row;return row;}
    rowOf[id]=row;
    let maxRow=row;
    const kids=children[id]||[];
    kids.forEach((child,idx)=>{
      const childRow=idx===0?row:maxRow+1;
      maxRow=Math.max(maxRow,assignRows(child.id,childRow,[...stack,id]));
    });
    return maxRow;
  }
  roots.forEach(root=>{
    rowMaxByRoot[root.id]=assignRows(root.id,0);
  });

  const slotOf={};
  function assignSlots(id,stack=[]){
    if(slotOf[id]!==undefined)return slotOf[id];
    if(stack.includes(id)){slotOf[id]=0;return 0;}
    const n=byId[id];
    let slot=0;
    if(n?.parentId&&byId[n.parentId]){
      const parentSlot=assignSlots(n.parentId,[...stack,id]);
      slot=offsets[n.parentId]===offsets[id]?parentSlot+1:0;
    }
    slotOf[id]=slot;
    return slot;
  }
  Object.keys(allNs).forEach(id=>assignSlots(id));

  const maxSlotByOff={};
  Object.keys(allNs).forEach(id=>{
    const off=offsets[id],slot=slotOf[id]||0;
    maxSlotByOff[off]=Math.max(maxSlotByOff[off]??0,slot);
  });
  const sortedOffs=Object.keys(maxSlotByOff).map(Number).sort((a,b)=>a-b);
  const dateX={};
  const groupBounds={};
  let curX=TIME_BASE_X;
  sortedOffs.forEach(off=>{
    const width=(maxSlotByOff[off]||0)*TIME_NODE_STEP+NW;
    dateX[off]=curX;
    groupBounds[off]={minX:curX,maxX:curX+width};
    curX+=width+GROUP_GAP;
  });

  let naturalLaneY=TIME_LANE_BASE_Y;
  const rawLanes=roots.map((root,idx)=>{
    const rows=(rowMaxByRoot[root.id]??0)+1;
    const height=(rows-1)*SL+NH;
    const naturalY=naturalLaneY;
    naturalLaneY+=height+TIME_PROJECT_GAP;
    return{rootId:root.id,rawY:naturalY+(laneOffsets[root.id]||0),height,idx};
  });

  const laneY={};
  const laneBounds={};
  let floorY=TIME_LANE_BASE_Y;
  rawLanes.forEach(lane=>{
    const y=Math.max(lane.rawY,floorY);
    laneY[lane.rootId]=y;
    laneBounds[lane.rootId]={top:y,bottom:y+lane.height};
    floorY=y+lane.height+TIME_PROJECT_GAP;
  });

  const pos={};
  Object.keys(allNs).forEach(id=>{
    const root=rootOf[id];
    const off=offsets[id];
    pos[id]={
      x:(dateX[off]??TIME_BASE_X)+(slotOf[id]||0)*TIME_NODE_STEP,
      y:(laneY[root]??TIME_LANE_BASE_Y)+(rowOf[id]||0)*SL
    };
  });

  return{pos,offsets,groupBounds,rootOf,laneBounds};
}

/* ── AI workflow text parser ── */
function parseWorkflowText(text){
  const lines=text.split('\n').map(l=>l.trimEnd()).filter(l=>l.trim());
  if(!lines.length)return[];
  const parsed=lines.map(line=>{
    const indent=line.match(/^\s*/)[0].length;
    const clean=line.trim()
      .replace(/^[\d]+[.。、)）]\s*/,'')
      .replace(/^[-•*→⟶▸·]\s*/,'')
      .replace(/^第[一二三四五六七八九十百]+[步阶段期][:：\s]*/,'')
      .replace(/^[一二三四五六七八九十百]+[.、]\s*/,'')
      .replace(/^[（(][一二三四五六七八九十百\d]+[)）]\s*/,'')
      .trim();
    return clean?{text:clean,indent}:null;
  }).filter(Boolean);
  if(!parsed.length)return[];
  const minInd=Math.min(...parsed.map(p=>p.indent));
  const norm=parsed.map(p=>({...p,indent:p.indent-minInd}));
  const specs=[];
  const stack=[{id:null,indent:-1}];
  let dayOff=0;
  norm.forEach(item=>{
    while(stack.length>1&&stack[stack.length-1].indent>=item.indent)stack.pop();
    const parentId=stack[stack.length-1].id;
    if(item.indent===0)dayOff++;
    const dl=offsetToDate(dayOff);
    const dlStr=`${dl.getFullYear()}-${String(dl.getMonth()+1).padStart(2,'0')}-${String(dl.getDate()).padStart(2,'0')}`;
    const id=uid();
    specs.push({id,title:item.text,parentId,deadline:dlStr});
    stack.push({id,indent:item.indent});
  });
  return specs;
}

  const saveWorkspaceToCloud=useCallback(async({manual=false}={})=>{

      const localHash=workspaceHash(currentWorkspace({lastCloudSavedAt:null,clientUpdatedAt:null}));

  const todayFocus=useMemo(()=>{

      if(off===0)return [1,0,-(n.createdAt||0)];
      return [n.source==='continue'?3:2,0,-(n.createdAt||0)];
    };
    const jobs=[...ongoing].sort((a,b)=>{
      const aa=score(a),bb=score(b);
      for(let i=0;i<aa.length;i++)if(aa[i]!==bb[i])return aa[i]-bb[i];
      return String(a.id).localeCompare(String(b.id));
    });

    if(pos&&cvRef.current){
      const rect=cvRef.current.getBoundingClientRect();
      const sx=rect.left+pos.x*scale+pan.x+NW*scale/2;
      const sy=rect.top+pos.y*scale+pan.y+NH*scale/2;
      const col=getColor(nodeId,nodes);

      const findFork=id=>{
        const n=prev[id];
        if(!n?.parentId)return null;
        if(Object.values(prev).filter(x=>x.parentId===n.parentId).length>1)return n.parentId;
        return findFork(n.parentId);
      };
      const forkId=findFork(nodeId);
      const upd={...prev};
      let cur=nodeId;
      while(cur&&cur!==forkId){

        if(!id)return;

        if(!n?.parentId)return;
        const sibs=Object.values(upd).filter(x=>x.parentId===n.parentId);
        if(sibs.length&&sibs.every(s=>s.status==='done')){

    saveSnap();
    setNodes(prev=>{
      const upd={...prev};
      specs.forEach(s=>{
        upd[s.id]={id:s.id,title:s.title,parentId:s.parentId,
          status:'active',createdAt:now(),color:DFL,deadline:s.deadline};
      });
      return upd;
    });
    const firstRoot=specs.find(s=>!s.parentId);
    if(firstRoot)setSelRoot(firstRoot.id);
  },[saveSnap]);

  /* Node drag */
  const startNodeDrag=(e,nodeId)=>{
    if(e.button!==0)return;
    e.stopPropagation();
    const p=timeViewRef.current?posRef.current[nodeId]:(manPosRef.current[nodeId]||posRef.current[nodeId]);
    if(!p)return;
    const rootId=timeViewRef.current?(rootOfRef.current[nodeId]||nodeId):null;
    dragRef.current={
      nodeId,rootId,
      mode:timeViewRef.current?'lane':'node',
      mouseX:e.clientX,mouseY:e.clientY,
      nodeX:p.x,nodeY:p.y,
      startOffset:rootId?(laneOffsetsRef.current[rootId]||0):0,
      snapped:false
    };
    setDragId(nodeId);
  };

  /* Middle-button pan / left-button marquee */
  const onMD=e=>{
    if(e.button===1){
      e.preventDefault();panRef.current=true;
      setPanMode(true);lastXY.current={x:e.clientX,y:e.clientY};
    } else if(e.button===0&&!dragRef.current){
      // Start marquee selection
      const r=cvRef.current.getBoundingClientRect();
      const cx=(e.clientX-r.left-panXYRef.current.x)/scaleRef.current;
      const cy=(e.clientY-r.top-panXYRef.current.y)/scaleRef.current;
      selBoxRef.current={x1:cx,y1:cy,x2:cx,y2:cy};
      setSelBox({x1:cx,y1:cy,x2:cx,y2:cy});
    }
  };

  const onMM=useCallback(e=>{
    if(panRef.current&&lastXY.current){
      const dx=e.clientX-lastXY.current.x,dy=e.clientY-lastXY.current.y;
      setPan(p=>({x:p.x+dx,y:p.y+dy}));
      lastXY.current={x:e.clientX,y:e.clientY};
    }
    if(dragRef.current){
      const{nodeId,rootId,mode,mouseX,mouseY,nodeX,nodeY,startOffset}=dragRef.current;
      if(!dragRef.current.snapped){saveSnap();dragRef.current.snapped=true;}
      const s=scaleRef.current;
      const dx=(e.clientX-mouseX)/s,dy=(e.clientY-mouseY)/s;
      if(mode==='lane'&&rootId){
        setLaneOffsets(p=>({...p,[rootId]:startOffset+dy}));
      }else{
        setManPos(p=>({...p,[nodeId]:{x:nodeX+dx,y:nodeY+dy}}));
      }
    }
    if(selBoxRef.current&&!dragRef.current){
      const r=cvRef.current?.getBoundingClientRect();if(!r)return;
      const cx=(e.clientX-r.left-panXYRef.current.x)/scaleRef.current;
      const cy=(e.clientY-r.top-panXYRef.current.y)/scaleRef.current;
      const nb={...selBoxRef.current,x2:cx,y2:cy};
      selBoxRef.current=nb;
      setSelBox({...nb});
    }
  },[saveSnap]);

  const GRID=24;
  const onMU=useCallback(e=>{
    if(dragRef.current){
      const{nodeId,rootId,mode,mouseX,mouseY}=dragRef.current;
      const moved=Math.abs(e.clientX-mouseX)>6||Math.abs(e.clientY-mouseY)>6;
      if(mode==='lane'&&rootId){
        setLaneOffsets(p=>{
          if(p[rootId]===undefined)return p;
          return{...p,[rootId]:Math.round(p[rootId]/GRID)*GRID};
        });
      }else{
        setManPos(p=>{
          const cur=p[nodeId];if(!cur)return p;
          return{...p,[nodeId]:{x:Math.round(cur.x/GRID)*GRID,y:Math.round(cur.y/GRID)*GRID}};
        });
      }
      if(!moved){
        // Click on node (no drag) → select it
        setSelIds(prev=>{
          if(e.ctrlKey||e.metaKey){
            const n=new Set(prev);
            if(n.has(nodeId))n.delete(nodeId);else n.add(nodeId);
            return n;
          }
          return new Set([nodeId]);
        });
      }
    }
    if(selBoxRef.current){
      const b=selBoxRef.current;
      const dx=Math.abs(b.x2-b.x1),dy=Math.abs(b.y2-b.y1);
      if(dx>6||dy>6){
        // Commit selection
        const minX=Math.min(b.x1,b.x2),maxX=Math.max(b.x1,b.x2);
        const minY=Math.min(b.y1,b.y2),maxY=Math.max(b.y1,b.y2);
        // posRef.current is updated separately; use current lpos+manPos snapshot
        // We read from the DOM positions via selBoxRef; actual ids computed by activeSelIds
        // Just re-compute here synchronously using current posRef
        const ids=new Set();
        Object.keys(posRef.current).forEach(id=>{
          const p=timeViewRef.current?posRef.current[id]:(manPosRef.current[id]||posRef.current[id]);
          if(!p)return;
          if(p.x>=minX&&p.x+NW<=maxX&&p.y>=minY&&p.y+NH<=maxY)ids.add(id);
        });
        setSelIds(ids);
      } else {
        // Just a click → clear selection
        setSelIds(new Set());
      }
      selBoxRef.current=null;
      setSelBox(null);
    }
    panRef.current=false;dragRef.current=null;
    setPanMode(false);setDragId(null);
    setDragHoverDay(null);dragHoverDayRef.current=null;
  },[]);

  /* Scroll zoom */
  const onWheel=useCallback(e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.1:1/1.1;
    const r=cvRef.current.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    setScale(prev=>{
      const next=Math.max(.1,Math.min(4,prev*f));
      setPan(p=>({x:mx-(mx-p.x)*(next/prev),y:my-(my-p.y)*(next/prev)}));
      return next;
    });
  },[]);

  useEffect(()=>{
    const el=cvRef.current;if(!el)return;
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[onWheel]);

  const onCtx=e=>e.preventDefault();

  /* Jump to project */
  const jumpTo=useCallback(rid=>{
    const projectNodes=collectProjectNodes(rid);
    const target=projectNodes.find(n=>posRef.current[n.id])||nodes[rid]||projectNodes[0];
    const p=target?(manPosRef.current[target.id]||posRef.current[target.id]):null;
    setSelRoot(rid);
    if(!p||!cvRef.current){
      if(hideDone){
        pendingProjectJumpRef.current=rid;
        setHideDone(false);
      }
      return;
    }
    const{clientWidth:w,clientHeight:h}=cvRef.current;
    const s=Math.max(1.55,scaleRef.current);
    setScale(s);
    setPan({x:w/2-p.x*s-NW/2*s,y:h/2-p.y*s-NH/2*s});
    if(target?.id)setSelIds(new Set([target.id]));
    setTimeout(()=>{
      const latest=target?.id?(posRef.current[target.id]||p):p;
      const el=cvRef.current;if(!latest||!el)return;
      const{clientWidth:lw,clientHeight:lh}=el;
      const finalScale=Math.max(1.55,scaleRef.current);
      setScale(finalScale);
      setPan({x:lw/2-latest.x*finalScale-NW/2*finalScale,y:lh/2-latest.y*finalScale-NH/2*finalScale});
    },520);
  },[collectProjectNodes,nodes,hideDone]);

  useEffect(()=>{
    if(hideDone||!pendingProjectJumpRef.current)return;
    const rid=pendingProjectJumpRef.current;
    pendingProjectJumpRef.current=null;
    requestAnimationFrame(()=>jumpTo(rid));
  },[hideDone,lpos,jumpTo]);

  /* Live marquee selection — preview while dragging, committed after release */
  const focusNode=useCallback((id,{zoom=false}={})=>{
    const p=posRef.current[id];
    if(!p||!cvRef.current)return;
    const{clientWidth:w,clientHeight:h}=cvRef.current;
    const s=zoom?Math.max(1.45,scaleRef.current):scaleRef.current;
    const nextPan={x:w/2-p.x*s-NW/2*s,y:h/2-p.y*s-NH/2*s};
    if(zoom)setScale(s);
    setPan(nextPan);
    if(zoom){
      setTimeout(()=>{
        const latest=posRef.current[id]||p;
        const el=cvRef.current;if(!el)return;
        const{clientWidth:lw,clientHeight:lh}=el;
        const finalScale=Math.max(1.45,scaleRef.current);
        setScale(finalScale);
        setPan({x:lw/2-latest.x*finalScale-NW/2*finalScale,y:lh/2-latest.y*finalScale-NH/2*finalScale});
      },520);
    }
    setSelIds(new Set([id]));
    const root=rootOfRef.current[id]||id;
    if(nodes[root])setSelRoot(root);
  },[nodes]);

  const focusNextTask=useCallback(()=>{
    const jobs=todayFocus.jobs||[];
    if(!jobs.length){showToast('没有 Ongoing 任务');return;}
    const cur=lastNextJobIdRef.current;
    const curIndex=jobs.findIndex(n=>n.id===cur);
    const next=jobs[(curIndex+1)%jobs.length];
    lastNextJobIdRef.current=next.id;
    focusNode(next.id,{zoom:true});
  },[todayFocus,focusNode,showToast]);

  useEffect(()=>{
    const id=pendingFocusRef.current;
    if(!id||!lpos[id])return;
    pendingFocusRef.current=null;
    requestAnimationFrame(()=>focusNode(id));
  },[lpos,focusNode]);

  const completionSummary=useMemo(()=>{
    if(!summaryRoot)return null;
    const root=nodes[summaryRoot];
    if(!root)return null;
    const list=collectProjectNodes(summaryRoot);
    const done=list.filter(n=>n.status==='done');
    const created=Math.min(...list.map(n=>n.createdAt||Date.now()));
    const lastDone=Math.max(...done.map(n=>n.completedAt||n.createdAt||0));
    return{
      title:root.title,
      total:list.length,
      done:done.length,
      lastDone:lastDone?fmt(lastDone):'--',
      days:Math.max(1,Math.ceil(((lastDone||Date.now())-created)/86400000))
    };
  },[summaryRoot,nodes,collectProjectNodes]);

  const activeSelIds=useMemo(()=>{
    if(!selBox)return selIds;
    const minX=Math.min(selBox.x1,selBox.x2);
    const maxX=Math.max(selBox.x1,selBox.x2);
    const minY=Math.min(selBox.y1,selBox.y2);
    const maxY=Math.max(selBox.y1,selBox.y2);
    const ids=new Set();
    Object.keys(allNs).forEach(id=>{
      const p=lpos[id];
      if(!p)return;
      if(p.x>=minX&&p.x+NW<=maxX&&p.y>=minY&&p.y+NH<=maxY)ids.add(id);
    });
    return ids;
  },[selBox,allNs,lpos,selIds]);

  /* SVG lines — inline gp avoids stale closure on getPos */
  const lines=useMemo(()=>{
    const gp=id=>lpos[id];
    return Object.values(allNs)
      .filter(n=>n.parentId&&gp(n.id)&&gp(n.parentId))
      .map(n=>{
        const pa=gp(n.parentId),ch=gp(n.id);
        const col=n.status==='done'?'#22c55e':n.status==='ghost'?'#388bfd':(CM[getColor(n.id,nodes)]?.line||'#388bfd');
        return{id:`${n.parentId}→${n.id}`,
          x1:pa.x+NW,y1:pa.y+NH/2,x2:ch.x,y2:ch.y+NH/2,
          done:n.status==='done',ghost:n.status==='ghost',col};
      });
  },[allNs,lpos,nodes]);

  // Canvas virtual size: enough to fit all positioned nodes
  const allPts=Object.keys(allNs).map(id=>getPos(id)).filter(Boolean);
  const cvW=allPts.length?Math.max(2200,...allPts.map(p=>p.x+NW+200)):2200;
  const cvH=allPts.length?Math.max(1800,...allPts.map(p=>p.y+NH+200)):1800;

  const curClass=`cv-wrap${panMode?' pan-mode':''}${dragId?' drag-node':''}${arranging?' arranging':''}`;

  /* Canvas width for ruler */
  const [cvAreaW,setCvAreaW]=useState(0);
  useEffect(()=>{
    if(!cvRef.current)return;
    const obs=new ResizeObserver(e=>setCvAreaW(e[0].contentRect.width));
    obs.observe(cvRef.current);return()=>obs.disconnect();
  },[]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {/* ── Header ── */}
      <header className="hdr">
        <div className="hdr-l">
          <button
            className="btn btn-ghost undo-btn"
            onClick={undo}
            disabled={histLen===0}
            title="撤销上一步 (Ctrl+Z)">
            ↩ 回撤
          </button>
          <span className="hdr-logo">⬡ Project Flow</span>
        </div>
        <div className="hdr-r">
          <span className={`sv${savedFlash?' show':''}`}>✓ 已保存</span>
          {currentUser&&(
            <span className={`ent-pill ${cloudStatus==='ok'?'ok':cloudStatus==='error'?'bad':''}`}>
              {cloudStatusText(cloudStatus,lastCloudSavedAt,cloudError)}
            </span>
          )}
          {currentUser&&(cloudStatus==='error'||cloudStatus==='pending')&&(
            <button className="btn btn-ghost sync-retry" onClick={()=>saveWorkspaceToCloud({manual:true})}>
              重试同步
            </button>
          )}
          <ThemeMenu theme={theme} setTheme={setTheme}/>
          <span className="pct">{Math.round(scale*100)}%</span>
          <button className={`btn btn-ghost${hideDone?' btn-active':''}`}
            onClick={()=>setHideDone(v=>!v)}
            title={hideDone?'显示已完成任务并重新排布':'隐藏已完成任务并重新排布'}>
            {hideDone?`显示已完成 (${doneHiddenCount})`:`隐藏已完成 (${doneHiddenCount})`}
          </button>
          <button className="btn btn-ghost" onClick={()=>{setGuideAuto(false);setGuideOpen(true);}}>使用指南</button>
          <button className="btn btn-ghost acct-btn" onClick={()=>setAccountOpen(true)}>
            Update Pro
          </button>
          <button className="btn btn-green" onClick={addRoot}>＋ New Project</button>
        </div>
      </header>

      {/* ── Main ── */}
      <div className="layout" style={{flex:1,overflow:'hidden'}}>
        <Sidebar roots={allRoots} nodes={nodes} selRoot={selRoot} onSelect={jumpTo} onAdd={addRoot} projectDoneSet={projectDoneSet}/>

        <div className="cv-area">
          {/* Time ruler */}
          {timeView&&(
            <TimeRuler pan={pan} scale={scale} cvW={cvAreaW} groupBounds={lposResult?.groupBounds||{}}/>
          )}

          {/* Canvas */}
          <div ref={cvRef} className={curClass}
            onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
            onContextMenu={onCtx}>

            <div className="cv" style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${scale})`,width:cvW,height:cvH}}>
              {/* Today group highlight — spans the actual X range of today's nodes */}
              {timeView&&lposResult?.groupBounds?.[0]&&(()=>{
                const{minX,maxX}=lposResult.groupBounds[0];
                return<div className="today-col-bg" style={{left:minX-16,width:maxX-minX+32,top:0,height:cvH}}/>;
              })()}

              {/* SVG connections */}
              <svg style={{position:'absolute',inset:0,width:cvW,height:cvH,
                overflow:'visible',pointerEvents:'none'}}>
                {lines.map(l=>{
                  /* Build a Bezier path that looks good for both:
                     - forward connections (parent left of child): classic S-curve
                     - same-column / backward connections: elbow that goes around */
                  let d;
                  const dx=l.x2-l.x1;
                  if(dx>10){
                    // Normal forward: cubic Bezier
                    const mx=(l.x1+l.x2)/2;
                    d=`M${l.x1},${l.y1} C${mx},${l.y1} ${mx},${l.y2} ${l.x2},${l.y2}`;
                  }else{
                    // Same column or backward: elbow route going right then back
                    const elbX=l.x1+54;
                    const my=(l.y1+l.y2)/2;
                    d=`M${l.x1},${l.y1} C${elbX},${l.y1} ${elbX},${my} ${elbX},${my} C${elbX},${my} ${elbX},${l.y2} ${l.x2},${l.y2}`;
                  }
                  return(
                    <path key={l.id} className="conn"
                      d={d}
                      stroke={l.col}
                      strokeWidth={l.done?2.8:l.ghost?1.5:2}
                      opacity={l.ghost ? .3 : 1}
                      strokeDasharray={l.ghost?'5 4':undefined}
                      style={{
                        transition:'stroke .45s,stroke-width .3s',
                        filter:l.done?'drop-shadow(0 0 6px #22c55e80)':'none'
                      }}/>
                  );
                })}
                <style>{`@keyframes lineIn{from{opacity:0}to{opacity:1}}`}</style>
              </svg>

              {/* Node cards */}
              {Object.values(visibleNodes).map(n=>{
                const p=getPos(n.id);if(!p)return null;
                const col=getColor(n.id,nodes);
                return(
                  <NodeCard key={n.id} node={n} p={p} colorKey={col}
                    isDragging={dragId===n.id}
                    isSelected={activeSelIds.has(n.id)}
                    projectDone={projectDoneSet.has(n.id)}
                    onDragStart={e=>{
                      // Node drag cancels marquee
                      selBoxRef.current=null;setSelBox(null);
                      startNodeDrag(e,n.id);
                    }}
                    onContinue={()=>onContinue(n.id)}
                    onBranch={()=>onBranch(n.id)}
                    onDone={()=>onDone(n.id)}
                    onEdit={t=>onEdit(n.id,t)}
                    onDelete={()=>onDelete(n.id)}
                    onSetColor={c=>onSetColor(n.id,c)}
                    onSetDeadline={dl=>onSetDeadline(n.id,dl)}
                    onSummary={()=>setSummaryRoot(n.id)}/>
                );
              })}

              {/* Marquee selection box */}
              {selBox&&(()=>{
                const x=Math.min(selBox.x1,selBox.x2);
                const y=Math.min(selBox.y1,selBox.y2);
                const w=Math.abs(selBox.x2-selBox.x1);
                const h=Math.abs(selBox.y2-selBox.y1);
                return<div style={{
                  position:'absolute',left:x,top:y,width:w,height:h,
                  border:'1.5px solid rgba(88,166,255,.7)',
                  background:'rgba(56,139,253,.08)',
                  borderRadius:4,pointerEvents:'none',zIndex:500
                }}/>;
              })()}

              {/* Ghost input cards */}
              {Object.entries(inputs).map(([tid,inp])=>{
                const p=getPos(tid);if(!p)return null;
                return(
                  <NewCard key={tid} p={p} label={inp.label} value={inp.value}
                    onChange={v=>setInputs(p=>({...p,[tid]:{...p[tid],value:v}}))}
                    onConfirm={()=>confirmInput(tid)} onCancel={()=>closeInput(tid)}/>
                );
              })}
            </div>

            {/* Stats panel */}
            <StatsPanel nodes={hideDone?visibleNodes:nodes} onNextJob={focusNextTask} nextJobCount={todayFocus.ongoing}/>
            <div className="hint">中键拖拽 · 左键框选 · Delete删除 · 滚轮缩放</div>
          </div>
        </div>
      </div>

      {/* ── AI Bar ── */}
      <AIBar open={aiBarOpen} onToggle={()=>setAiBarOpen(o=>!o)} onGenerate={onAiGenerate}/>

      {!authReady&&<AuthGate loading theme={theme} setTheme={setTheme}/>}
      {authReady&&!currentUser&&(
        <AuthGate
          mode={authMode}
          setMode={setAuthMode}
          error={authErr}
          busy={authBusy}
          configured={!!supabaseClient}
          onSubmit={submitAuth}
          theme={theme}
          setTheme={setTheme}/>
      )}
      {currentUser&&entitlement&&!entitlement.active&&(
        <LockedOverlay
          entitlement={entitlement}
          onAccount={()=>setAccountOpen(true)}
          onGuide={()=>{setGuideAuto(false);setGuideOpen(true);}}/>
      )}
      {accountOpen&&currentUser&&(
        <AccountModal
          user={currentUser}
          bundle={profileBundle}
          licenseKey={licenseKey}
          setLicenseKey={setLicenseKey}
          licenseBusy={licenseBusy}
          licenseErr={licenseErr}
          onClose={()=>setAccountOpen(false)}
          onCheckout={startCheckout}
          onRedeem={redeemLicense}
          onSignOut={signOut}/>
      )}
      {guideOpen&&(
        <GuideModal
          auto={guideAuto}
          onClose={()=>{setGuideOpen(false);setGuideAuto(false);}}
          onFinish={finishGuide}/>
      )}
      {desktopPanel&&(
        <DesktopPanel
          panel={desktopPanel}
          version={desktopVersion}
          user={currentUser}
          nodes={nodes}
          histLen={histLen}
          cloudStatus={cloudStatus}
          lastCloudSavedAt={lastCloudSavedAt}
          cloudError={cloudError}
          ghStatus={ghStatus}
          mic={desktopMic}
          dictInput={dictInput}
          setDictInput={setDictInput}
          dictionaryTerms={dictionaryTerms}
          onAddDictionaryTerm={addDictionaryTerm}
          onClose={()=>setDesktopPanel(null)}
          onGuide={()=>{setGuideAuto(false);setGuideOpen(true);setDesktopPanel(null);}}
          onAccount={()=>{setAccountOpen(true);setDesktopPanel(null);}}
          onGist={()=>{setShowGhModal(true);setDesktopPanel(null);}}/>
      )}

      {conflict&&(
        <ConflictModal
          updatedAt={conflict.updatedAt}
          onUseCloud={()=>{
            applyWorkspaceData(conflict.cloudData);
            syncPausedRef.current=false;
            cloudLoadedRef.current=true;
            lastSyncedHashRef.current=conflict.cloudData?.workspaceHash||workspaceHash(conflict.cloudData);
            setConflict(null);
            setCloudStatus('ok');
            showToast('已使用云端数据');
          }}
          onUploadLocal={()=>{
            setConflict(null);
            syncPausedRef.current=false;
            cloudLoadedRef.current=true;
            saveWorkspaceToCloud({manual:true});
          }}
          onLater={()=>{
            setConflict(null);
            syncPausedRef.current=true;
            cloudLoadedRef.current=false;
            setCloudStatus('pending');
            showToast('已暂停云同步，可稍后重试');
          }}/>
      )}
      {completionSummary&&(
        <CompletionSummaryModal summary={completionSummary} onClose={()=>setSummaryRoot(null)}/>
      )}
      {toast&&<div className="toast">{toast}</div>}

      {/* ── Delete confirmation dialog ── */}
      {deleteConfirm&&(
        <div className="del-confirm-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="del-confirm-box" onClick={e=>e.stopPropagation()}>
            <h3>确认删除</h3>
            <p>将删除 <strong style={{color:'var(--tx)'}}>{deleteConfirm.ids.size}</strong> 个节点<br/>（子节点将挂到父节点，可撤销）</p>
            <div className="del-confirm-btns">
              <button className="del-btn-yes" onClick={confirmBulkDelete}>Yes</button>
              <button className="del-btn-no" onClick={()=>setDeleteConfirm(null)}>No</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Done animations ── */}
      {doneAnims.map(a=>(
        <div key={a.id} className="done-particle"
          style={{left:a.sx,top:a.sy,color:a.color}}>
          <div className="done-particle-ring"/>
          <div className="done-particle-icon">{a.emoji}</div>
          <div className="done-particle-label" style={{color:a.color}}>Done!</div>
        </div>
      ))}

      {/* ── GitHub Gist Modal ── */}
      {showGhModal&&(
        <div className="mo" onClick={e=>{if(e.target===e.currentTarget)setShowGhModal(false)}}>
          <div className="mp">
            {ghUser?(
              <>
                <h2>☁ GitHub Gist 同步</h2>
                {ghStatus==='ok'&&<div className="mp-status ok">✓ 已连接 — @{ghUser.login}</div>}

/* ══════════════════════════════════════════
   Time Ruler
══════════════════════════════════════════ */
/* TimeRuler uses groupBounds from calcTimeLayout for non-overlapping date labels */
function TimeRuler({pan,scale,cvW,groupBounds}){
  const cols=useMemo(()=>{
    return Object.entries(groupBounds||{}).map(([off,{minX,maxX}])=>{
      const d=parseInt(off);
      const screenLeft=pan.x+minX*scale-8;
      const w=(maxX-minX)*scale+16;
      if(screenLeft+w<-20||screenLeft>(cvW||9999)+20)return null;
      const date=offsetToDate(d);
      const{date:dateStr,week}=fmtRulerDate(date);
      return{d,screenLeft,w:Math.max(w,72),dateStr,week,isToday:d===0,isPast:d<0};
    }).filter(Boolean).sort((a,b)=>a.d-b.d);
  },[groupBounds,pan,scale,cvW]);

  return(
    <div className="time-ruler">
      {cols.map(c=>(
        <div key={c.d}
          className={`tr-col${c.isToday?' today':c.isPast?' past':''}`}
          style={{left:c.screenLeft,width:c.w}}>
          {c.isToday&&<span className="tr-today-badge">TODAY</span>}
          <div className="tr-date">{c.dateStr}</div>
          <div className="tr-week">{c.week}</div>
        </div>
      ))}
    </div>
  );
}

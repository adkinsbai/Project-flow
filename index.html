        <div className="summary-grid">
          <div className="summary-item"><div className="summary-k">节点总数</div><div className="summary-v">{summary.total}</div></div>
          <div className="summary-item"><div className="summary-k">完成数</div><div className="summary-v">{summary.done}</div></div>
          <div className="summary-item"><div className="summary-k">最后完成</div><div className="summary-v">{summary.lastDone}</div></div>
          <div className="summary-item"><div className="summary-k">持续天数</div><div className="summary-v">{summary.days}</div></div>
        </div>
        <div className="mp-actions"><button className="btn btn-green" onClick={onClose}>知道了</button></div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   AI Bar
══════════════════════════════════════════ */
function AIBar({open,onToggle,onGenerate}){
  const [text,setText]=useState('');
  const [generating,setGenerating]=useState(false);

  const handle=()=>{
    if(!text.trim()||generating)return;
    setGenerating(true);
    setTimeout(()=>{
      onGenerate(text.trim());
      setText('');setGenerating(false);
    },520);
  };

  return(
    <div className="ai-bar">
      <div className="ai-toggle" onClick={onToggle}>
        <span className="ai-glow">✦</span>
        <span>AI 工作流生成</span>
        <span style={{fontSize:11,color:'var(--su)',marginLeft:4}}>
          {open?'— 输入任务描述，自动整理成工作节点':'— 点击展开'}
        </span>
        <span className={`ai-chevron${open?' up':''}`}>▲</span>
      </div>
      {open&&(
        <div className="ai-body">
          <textarea
            className="ai-textarea"
            placeholder={'描述你的任务和计划，AI 自动整理成工作流节点...\n\n示例：\n1. 市场调研\n   - 竞品分析\n   - 用户访谈\n2. 产品设计\n   - 线框图\n   - 原型测试\n3. 开发上线'}
            value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))handle();}}
          />
          <div className="ai-actions">
            <span className="ai-hint">支持缩进层级 · 数字列表 · 中文步骤 · Ctrl+Enter 生成</span>
            {generating?(
              <span className="ai-generating">
                <span className="ai-spin">⟳</span> 生成工作流中…
              </span>
            ):(
              <button className="btn btn-green" onClick={handle} disabled={!text.trim()}>
                ✦ 生成工作流
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   Sidebar
══════════════════════════════════════════ */
function Sidebar({roots,nodes,selRoot,onSelect,onAdd,projectDoneSet=new Set()}){
  const countAll=rid=>{let c=0;const v=id=>{c++;Object.values(nodes).filter(n=>n.parentId===id).forEach(x=>v(x.id));};v(rid);return c;};
  const countDone=rid=>{let c=0;const v=id=>{if(nodes[id]?.status==='done')c++;Object.values(nodes).filter(n=>n.parentId===id).forEach(x=>v(x.id));};v(rid);return c;};
  const timeline=useMemo(()=>
    Object.values(nodes)
      .sort((a,b)=>(b.completedAt||b.createdAt)-(a.completedAt||a.createdAt))
      .slice(0,35)
  ,[nodes]);
  return(
    <aside className="sb">
      <div className="sb-head">
        <div className="sb-lbl">Projects</div>
        {roots.map(r=>{
          const col=CM[r.color||DFL];
          const total=countAll(r.id),done=countDone(r.id);
          const allDone=projectDoneSet.has(r.id)||done===total&&total>0;
          return(
            <div key={r.id} className={`pi${selRoot===r.id?' sel':''}`}
              style={{'--pi-c':col?.line||'#388bfd'}}
              onClick={()=>onSelect(r.id)}>
              <div className="pdot" style={{
                background:allDone?'#22c55e':col?.dot||'#60a5fa',
                boxShadow:selRoot===r.id?`0 0 8px ${allDone?'#22c55e':col?.dot||'#388bfd'}`:'none'
              }}/>
              <span className="pname">{r.title}</span>
              {allDone&&<span className="pdone-label">已完成</span>}
              <span className={`pcnt${allDone?' all-done':''}`}>{done}/{total}</span>
            </div>
          );
        })}
        <button className="sb-add" onClick={onAdd}>
          <span style={{fontSize:14,lineHeight:1}}>＋</span> New project
        </button>
      </div>
      <div className="tl-wrap">
        <div className="tl-lbl">Timeline</div>
        {timeline.map(n=>{
          const col=CM[getColor(n.id,nodes)];
          const isDone=n.status==='done';
          return(
            <div key={n.id} className="ti">
              <div className="tidot" style={{
                background:isDone?'#22c55e':col?.dot||'#60a5fa',
                boxShadow:`0 0 6px ${isDone?'#22c55e':col?.dot||'#388bfd'}70`
              }}/>
              <div className="tic">
                <div className="tit">{n.title}</div>
                <div className="tim">
                  {isDone&&n.completedAt?`✓ Done ${fmt(n.completedAt)}`:`${fmt(n.createdAt)}`}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </aside>
  );
}

/* ══════════════════════════════════════════
   NodeCard
══════════════════════════════════════════ */
function NodeCard({node,p,colorKey,isDragging,isSelected,projectDone,onDragStart,onContinue,onBranch,onDone,onEdit,onDelete,onSetColor,onSetDeadline,onSummary}){
  const [menuOpen,setMenuOpen]=useState(false);
  const [cpOpen,setCpOpen]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editDl,setEditDl]=useState(false);
  const [val,setVal]=useState(node.title);
  const [dlVal,setDlVal]=useState(node.deadline||'');
  const ddRef=useRef(null);
  const cpRef=useRef(null);
  const inRef=useRef(null);
  const dlRef=useRef(null);

  useEffect(()=>{setVal(node.title);},[node.title]);
  useEffect(()=>{setDlVal(node.deadline||'');},[node.deadline]);
  useEffect(()=>{if(editing){inRef.current?.focus();inRef.current?.select();}},[editing]);
  useEffect(()=>{if(editDl){dlRef.current?.focus();dlRef.current?.showPicker?.();}},[editDl]);

  useEffect(()=>{
    const h=e=>{
      if(ddRef.current&&!ddRef.current.contains(e.target))setMenuOpen(false);
      if(cpRef.current&&!cpRef.current.contains(e.target))setCpOpen(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const commit=()=>{if(val.trim())onEdit(val.trim());setEditing(false);};
  const commitDl=()=>{
    if(dlVal)onSetDeadline(dlVal);
    else onSetDeadline(null);
    setEditDl(false);
  };
  const isDone=node.status==='done';
  const col=CM[colorKey]||CM[DFL];
  const cssV={
    '--nc-dot':isDone?'#4ade80':col.dot,
    '--nc-bd': isDone?'#166534':col.bd,
    '--nc-glow':isDone?'rgba(74,222,128,.15)':col.glow,
  };

  /* Deadline display */
  const dlInfo=node.deadline?fmtDeadline(node.deadline,isDone):null;

  return(
    <div className={`nc${isDone?' s-done':''}${isDragging?' is-drag':''}${isSelected?' is-sel':''}`}
      style={{left:p.x,top:p.y,...cssV}}
      onMouseDown={onDragStart}>

      {/* Color picker */}
      <div ref={cpRef} className="cp-wrap">
        <div className="cp-ring"
          onMouseDown={e=>e.stopPropagation()}
          onClick={e=>{e.stopPropagation();setCpOpen(o=>!o);}}/>
        {cpOpen&&(
          <div className="cp-panel" onMouseDown={e=>e.stopPropagation()}>
            {COLORS.map(c=>(
              <div key={c.key}
                className={`cp-opt${colorKey===c.key?' sel':''}`}
                style={{background:c.dot}}
                title={c.key}
                onClick={e=>{e.stopPropagation();onSetColor(c.key);setCpOpen(false);}}/>
            ))}
          </div>
        )}
      </div>

      {/* Title */}
      <div className="nc-top">
        <div className="ndot"/>
        {editing
          ?<input ref={inRef} className="nti" value={val}
              onChange={e=>setVal(e.target.value)}
              onMouseDown={e=>e.stopPropagation()}
              onBlur={commit}
              onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){setVal(node.title);setEditing(false);}}}/>
          :<span className="ntitle" title="双击编辑"
              onDoubleClick={e=>{e.stopPropagation();setEditing(true);}}
              onMouseDown={e=>{/* allow drag */}}>
              {node.title}
            </span>
        }
      </div>

      {/* Bottom row */}
      <div className="nc-bot">
        <div style={{display:'flex',flexDirection:'column',gap:2,flex:1,minWidth:0}}>
          <span className="ndate">
            {fmt(node.createdAt)}
            {node.completedAt&&<span style={{color:'var(--green)'}}> ✓{fmt(node.completedAt)}</span>}
          </span>
          {projectDone&&(
            <button className="done-summary-chip"
              onMouseDown={e=>e.stopPropagation()}
              onClick={e=>{e.stopPropagation();onSummary?.();}}>
              项目已完成
            </button>
          )}
          {/* Deadline */}
          {editDl?(
            <input ref={dlRef} className="ndeadline-input" type="date"
              value={dlVal}
              onChange={e=>setDlVal(e.target.value)}
              onMouseDown={e=>e.stopPropagation()}
              onBlur={commitDl}
              onKeyDown={e=>{if(e.key==='Enter')commitDl();if(e.key==='Escape')setEditDl(false);}}/>
          ):(
            <span
              className={`ndeadline${dlInfo?` ${dlInfo.cls}`:' neutral'}`}
              title="点击设置截止日期"
              onMouseDown={e=>e.stopPropagation()}
              onClick={e=>{e.stopPropagation();setEditDl(true);}}>
              {dlInfo?`⏱ ${dlInfo.label}`:'+ 截止日期'}
            </span>
          )}
        </div>
        <div className="nac">
          <button className="ib" title="Edit"
            onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();setEditing(true);}}>✎</button>
          <button className="ib del" title="Delete"
            onMouseDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();onDelete();}}>✕</button>
          <div ref={ddRef} style={{position:'relative'}}>
            <button className={`arb${menuOpen?' open':''}`}
              onMouseDown={e=>e.stopPropagation()}
              onClick={e=>{e.stopPropagation();setMenuOpen(o=>!o);}}>▶</button>
            {menuOpen&&(
              <div className="dd" onMouseDown={e=>e.stopPropagation()}>
                <button className="ddi c" disabled={isDone} title={isDone?'已完成节点不能继续推进':'Continue'}
                  onClick={()=>{if(!isDone)onContinue();setMenuOpen(false);}}>→ Continue</button>
                <button className="ddi b" onClick={()=>{onBranch();setMenuOpen(false);}}>⊕ Add Branch</button>
                <div className="ddsep"/>
                <button className="ddi d" onClick={()=>{onDone();setMenuOpen(false);}}>✓ Done</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   NewCard
══════════════════════════════════════════ */
function NewCard({p,label,value,onChange,onConfirm,onCancel}){
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  return(
    <div className="newc" style={{left:p.x,top:p.y}}
      onMouseDown={e=>e.stopPropagation()}>
      <div className="newlbl">{label}</div>
      <div className="newrow">
        <input ref={ref} className="newinp" value={value}
          onChange={e=>onChange(e.target.value)}
          placeholder={label.includes('Continue')?'下一步是什么？':'Task name...'}
          onKeyDown={e=>{if(e.key==='Enter')onConfirm();if(e.key==='Escape')onCancel();}}/>
        <button className="bstart" onClick={onConfirm}>Start</button>
        <button className="bx" onClick={onCancel}>✕</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
